# Blueprint de Render: Web Node + PostgreSQL (datos persistentes en Render).
# Desde el dashboard: New → Blueprint → conectar repo y aplicar este archivo.
# Tras el deploy, revisa Environment del servicio web: LAB_TOKEN (o créalo a mano).

databases:
  - name: gpayasociar-db
    databaseName: gpayasociar
    user: gpayasociar
    plan: free

services:
  - type: web
    name: gpayasociar-web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: gpayasociar-db
          property: connectionString
      - key: LAB_TOKEN
        generateValue: true
